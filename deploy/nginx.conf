# Web 客户端站点：静态页 + 反代游戏服务器（WS 与 HTTP 接口）
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # 游戏客户端（SPA，单页应用兜底到 index.html）
    location / {
        try_files $uri $uri/ /index.html;
    }

    # WebSocket：/ws → 游戏服务器 /（云模式客户端连同源 /ws，无需配置地址）
    location /ws {
        proxy_pass http://server:9000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # 对局期间连接可能长时间无消息，放宽空闲超时
        proxy_read_timeout 3600s;
    }

    # HTTP 接口（/api/ai/chat、/api/status、/api/admin/*）
    location /api/ {
        proxy_pass http://server:9000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # 管理面板（Basic Auth 在服务端校验，默认 admin/cardwar）
    location = /admin.html {
        proxy_pass http://server:9000/admin.html;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}

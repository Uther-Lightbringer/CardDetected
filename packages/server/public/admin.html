<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CardDetect 服务器面板</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: #12141a; color: #d8dde6; min-height: 100vh; padding: 32px;
    }
    h1 { color: #e8b34b; font-size: 24px; letter-spacing: 2px; }
    .subtitle { color: #7a8494; font-size: 13px; margin-top: 4px; }
    .stats { display: flex; gap: 16px; margin: 24px 0; }
    .stat {
      background: #1c2029; border: 1px solid #2a2f3a; border-radius: 10px;
      padding: 16px 24px; min-width: 140px;
    }
    .stat .num { font-size: 28px; color: #e8b34b; font-weight: bold; }
    .stat .label { font-size: 12px; color: #7a8494; margin-top: 4px; }
    section { margin-top: 28px; }
    h2 { font-size: 16px; color: #9fb4d8; margin-bottom: 12px; border-left: 3px solid #e8b34b; padding-left: 10px; }
    table { width: 100%; border-collapse: collapse; background: #1c2029; border-radius: 10px; overflow: hidden; }
    th, td { padding: 10px 14px; text-align: left; font-size: 13px; }
    th { background: #232836; color: #8a94a6; font-weight: normal; }
    tr + tr td { border-top: 1px solid #262b36; }
    .empty { color: #5a6372; font-size: 13px; padding: 18px 14px; background: #1c2029; border-radius: 10px; }
    .tag { display: inline-block; padding: 2px 10px; border-radius: 99px; font-size: 12px; }
    .tag.playing { background: #3a2b17; color: #e8b34b; }
    .tag.waiting { background: #17302b; color: #4bd8a2; }
    .tag.lobby { background: #232836; color: #8a94a6; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #4bd8a2; margin-right: 8px; }
    .refresh { color: #5a6372; font-size: 12px; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>🕵️ CardDetect 服务器面板</h1>
  <div class="subtitle">实时显示已连接的客户端与游戏房间 · 每 2 秒自动刷新</div>

  <div class="stats">
    <div class="stat"><div class="num" id="clientCount">-</div><div class="label">在线客户端</div></div>
    <div class="stat"><div class="num" id="roomCount">-</div><div class="label">房间数</div></div>
    <div class="stat"><div class="num" id="uptime">-</div><div class="label">运行时长</div></div>
  </div>

  <section>
    <h2>已连接的客户端</h2>
    <div id="clients"></div>
  </section>

  <section>
    <h2>游戏房间</h2>
    <div id="rooms"></div>
  </section>

  <script>
    function fmtUptime(sec) {
      const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
      return h > 0 ? `${h}时${m}分` : m > 0 ? `${m}分${s}秒` : `${s}秒`;
    }
    function esc(s) { return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

    async function refresh() {
      try {
        const res = await fetch('/api/status');
        const data = await res.json();
        document.getElementById('clientCount').textContent = data.clients.length;
        document.getElementById('roomCount').textContent = data.rooms.length;
        document.getElementById('uptime').textContent = fmtUptime(data.uptimeSec);

        document.getElementById('clients').innerHTML = data.clients.length === 0
          ? '<div class="empty">暂无客户端连接</div>'
          : `<table><tr><th></th><th>用户名</th><th>头像</th><th>连接时间</th><th>状态</th></tr>` +
            data.clients.map(c => `<tr>
              <td><span class="dot"></span></td>
              <td>${esc(c.username)}</td>
              <td>${esc(c.avatar)}</td>
              <td>${new Date(c.connectedAt).toLocaleTimeString()}</td>
              <td>${c.roomId ? `<span class="tag ${c.state === 'playing' ? 'playing' : 'waiting'}">${c.state === 'playing' ? '对战中' : '房间内'}</span>` : '<span class="tag lobby">大厅</span>'}</td>
            </tr>`).join('') + '</table>';

        document.getElementById('rooms').innerHTML = data.rooms.length === 0
          ? '<div class="empty">暂无房间</div>'
          : `<table><tr><th>房间名</th><th>房主</th><th>玩家</th><th>状态</th><th>回合数</th></tr>` +
            data.rooms.map(r => `<tr>
              <td>${esc(r.name)} <span style="color:#5a6372">#${esc(r.id)}</span></td>
              <td>${esc(r.host)}</td>
              <td>${r.players.map(esc).join(' vs ')}${r.players.length < 2 ? '（等待中）' : ''}</td>
              <td><span class="tag ${r.state}">${r.state === 'playing' ? '对战中' : '等待中'}</span></td>
              <td>${r.turn ?? '-'}</td>
            </tr>`).join('') + '</table>';
      } catch (e) {
        console.error('刷新失败', e);
      }
    }
    refresh();
    setInterval(refresh, 2000);
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CardDetect 服务器面板</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
      background: #12141a; color: #d8dde6; min-height: 100vh; padding: 32px;
    }
    h1 { color: #e8b34b; font-size: 24px; letter-spacing: 2px; }
    .subtitle { color: #7a8494; font-size: 13px; margin-top: 4px; }
    .stats { display: flex; gap: 16px; margin: 24px 0; }
    .stat {
      background: #1c2029; border: 1px solid #2a2f3a; border-radius: 10px;
      padding: 16px 24px; min-width: 140px;
    }
    .stat .num { font-size: 28px; color: #e8b34b; font-weight: bold; }
    .stat .label { font-size: 12px; color: #7a8494; margin-top: 4px; }
    section { margin-top: 28px; }
    h2 { font-size: 16px; color: #9fb4d8; margin-bottom: 12px; border-left: 3px solid #e8b34b; padding-left: 10px; }
    table { width: 100%; border-collapse: collapse; background: #1c2029; border-radius: 10px; overflow: hidden; }
    th, td { padding: 10px 14px; text-align: left; font-size: 13px; }
    th { background: #232836; color: #8a94a6; font-weight: normal; }
    tr + tr td { border-top: 1px solid #262b36; }
    .empty { color: #5a6372; font-size: 13px; padding: 18px 14px; background: #1c2029; border-radius: 10px; }
    .tag { display: inline-block; padding: 2px 10px; border-radius: 99px; font-size: 12px; }
    .tag.playing { background: #3a2b17; color: #e8b34b; }
    .tag.waiting { background: #17302b; color: #4bd8a2; }
    .tag.lobby { background: #232836; color: #8a94a6; }
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #4bd8a2; margin-right: 8px; }
    .refresh { color: #5a6372; font-size: 12px; margin-top: 8px; }
    /* AI 配置表单 */
    .panel { background: #1c2029; border: 1px solid #2a2f3a; border-radius: 10px; padding: 20px 24px; max-width: 560px; }
    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 13px; color: #8a94a6; margin-bottom: 6px; }
    .field input[type=text], .field input[type=password], .field select {
      width: 100%; padding: 8px 12px; border-radius: 8px; border: 1px solid #2a2f3a;
      background: #12141a; color: #d8dde6; font-size: 13px; outline: none;
    }
    .field input:focus, .field select:focus { border-color: #e8b34b; }
    .field .inline { display: flex; align-items: center; gap: 8px; font-size: 13px; color: #d8dde6; }
    .btn {
      padding: 8px 20px; border-radius: 8px; border: none; cursor: pointer; font-size: 13px;
      background: #e8b34b; color: #12141a; font-weight: bold;
    }
    .btn:hover { filter: brightness(1.1); }
    .form-msg { font-size: 12px; margin-top: 10px; min-height: 16px; }
    .form-msg.ok { color: #4bd8a2; }
    .form-msg.fail { color: #e86b6b; }
  </style>
</head>
<body>
  <h1>🕵️ CardDetect 服务器面板</h1>
  <div class="subtitle">实时显示已连接的客户端与游戏房间 · 每 2 秒自动刷新</div>

  <div class="stats">
    <div class="stat"><div class="num" id="clientCount">-</div><div class="label">在线客户端</div></div>
    <div class="stat"><div class="num" id="roomCount">-</div><div class="label">房间数</div></div>
    <div class="stat"><div class="num" id="uptime">-</div><div class="label">运行时长</div></div>
  </div>

  <section>
    <h2>已连接的客户端</h2>
    <div id="clients"></div>
  </section>

  <section>
    <h2>游戏房间</h2>
    <div id="rooms"></div>
  </section>

  <section>
    <h2>AI 配置（单人模式大模型）</h2>
    <div class="panel">
      <div class="field">
        <label>模型厂商</label>
        <select id="aiProvider" disabled>
          <option value="deepseek">Deepseek</option>
        </select>
      </div>
      <div class="field">
        <label>API Key <span id="aiKeyState" style="color:#5a6372"></span></label>
        <input type="password" id="aiKey" placeholder="留空表示不修改" autocomplete="new-password" />
      </div>
      <div class="field">
        <label>模型</label>
        <input type="text" id="aiModel" />
      </div>
      <div class="field">
        <label>接口地址（Base URL）</label>
        <input type="text" id="aiBaseUrl" />
      </div>
      <div class="field">
        <label class="inline"><input type="checkbox" id="aiClearKey" /> 清除已保存的 Key</label>
      </div>
      <div class="field">
        <label class="inline"><input type="checkbox" id="aiEnabled" /> 启用 AI 代理（停用时客户端单人模式回落内置机器人）</label>
      </div>
      <button class="btn" id="aiSave">保存配置</button>
      <div class="form-msg" id="aiMsg"></div>
    </div>
  </section>

  <script>
    function fmtUptime(sec) {
      const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = sec % 60;
      return h > 0 ? `${h}时${m}分` : m > 0 ? `${m}分${s}秒` : `${s}秒`;
    }
    function esc(s) { return String(s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }

    async function refresh() {
      try {
        const res = await fetch('/api/status');
        const data = await res.json();
        document.getElementById('clientCount').textContent = data.clients.length;
        document.getElementById('roomCount').textContent = data.rooms.length;
        document.getElementById('uptime').textContent = fmtUptime(data.uptimeSec);

        document.getElementById('clients').innerHTML = data.clients.length === 0
          ? '<div class="empty">暂无客户端连接</div>'
          : `<table><tr><th></th><th>用户名</th><th>头像</th><th>连接时间</th><th>状态</th></tr>` +
            data.clients.map(c => `<tr>
              <td><span class="dot"></span></td>
              <td>${esc(c.username)}</td>
              <td>${esc(c.avatar)}</td>
              <td>${new Date(c.connectedAt).toLocaleTimeString()}</td>
              <td>${c.roomId ? `<span class="tag ${c.state === 'playing' ? 'playing' : 'waiting'}">${c.state === 'playing' ? '对战中' : '房间内'}</span>` : '<span class="tag lobby">大厅</span>'}</td>
            </tr>`).join('') + '</table>';

        document.getElementById('rooms').innerHTML = data.rooms.length === 0
          ? '<div class="empty">暂无房间</div>'
          : `<table><tr><th>房间名</th><th>房主</th><th>玩家</th><th>状态</th><th>回合数</th></tr>` +
            data.rooms.map(r => `<tr>
              <td>${esc(r.name)} <span style="color:#5a6372">#${esc(r.id)}</span></td>
              <td>${esc(r.host)}</td>
              <td>${r.players.map(esc).join(' vs ')}${r.players.length < 2 ? '（等待中）' : ''}</td>
              <td><span class="tag ${r.state}">${r.state === 'playing' ? '对战中' : '等待中'}</span></td>
              <td>${r.turn ?? '-'}</td>
            </tr>`).join('') + '</table>';
      } catch (e) {
        console.error('刷新失败', e);
      }
    }
    // ---------- AI 配置 ----------
    async function loadAiConfig() {
      try {
        const res = await fetch('/api/admin/ai-config');
        if (!res.ok) return;
        const cfg = await res.json();
        document.getElementById('aiModel').value = cfg.model;
        document.getElementById('aiBaseUrl').value = cfg.baseUrl;
        document.getElementById('aiEnabled').checked = cfg.enabled;
        document.getElementById('aiKeyState').textContent = cfg.hasKey ? `（已保存 ${cfg.keyPreview}）` : '（未配置）';
      } catch (e) { console.error('加载 AI 配置失败', e); }
    }
    document.getElementById('aiSave').addEventListener('click', async () => {
      const msg = document.getElementById('aiMsg');
      const body = {
        model: document.getElementById('aiModel').value,
        baseUrl: document.getElementById('aiBaseUrl').value,
        enabled: document.getElementById('aiEnabled').checked,
      };
      const key = document.getElementById('aiKey').value;
      if (document.getElementById('aiClearKey').checked) body.apiKey = '';
      else if (key) body.apiKey = key;
      try {
        const res = await fetch('/api/admin/ai-config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        msg.className = 'form-msg ok';
        msg.textContent = '已保存';
        document.getElementById('aiKey').value = '';
        document.getElementById('aiClearKey').checked = false;
        loadAiConfig();
      } catch (e) {
        msg.className = 'form-msg fail';
        msg.textContent = `保存失败：${e.message}`;
      }
    });

    refresh();
    setInterval(refresh, 2000);
    loadAiConfig();
  </script>
</body>
</html>
